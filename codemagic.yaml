workflows:
  android-capacitor:
    name: Sakina Android APK
    max_build_duration: 30
    environment:
      node: 18.17.0
      java: 17

    scripts:
      - name: Install Capacitor
        script: npm install

      - name: Add Android platform
        script: |
          npx cap add android || true

      - name: Sync web assets
        script: npx cap sync android

      - name: Build debug APK
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
